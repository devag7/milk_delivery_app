<!DOCTYPE html>
<html>
<head>
	<title>Customers | Milk Delivery</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<style>
		body { overflow-x: hidden; }
		.sidebar {
			height: 100vh;
			background-color: #343a40;
			color: white;
			padding-top: 20px;
		}
		.sidebar a {
			color: white;
			display: block;
			padding: 10px;
			text-decoration: none;
		}
		.sidebar a:hover { background-color: #495057; }
	</style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3 d-flex justify-content-between">
	<span class="navbar-brand">🥛 Milk Delivery System</span>
	<a href="/logout" class="btn btn-danger btn-sm">Logout</a>
</nav>

<div class="container-fluid">
	<div class="row">
		<div class="col-md-2 sidebar">
			<h5 class="text-center">Menu</h5>
			<a href="/">Dashboard</a>
			<a href="/customers">Customers</a>
			<a href="/billing">Billing</a>
			<a href="/reports">Reports</a>
		</div>

		<div class="col-md-10 p-4">
			<h3 class="mb-4">Customer Management</h3>

			<div class="card p-4 mb-4 shadow">
				<form id="customerForm">
					<div class="row g-3">
						<div class="col-md-3">
							<input type="text" id="name" class="form-control" placeholder="Name" required>
						</div>

						<div class="col-md-3">
							<input type="text" id="milk" class="form-control" placeholder="Milk Type" required>
						</div>

						<div class="col-md-2">
							<input type="number" step="0.01" id="quantity" class="form-control" placeholder="Qty (L)" required>
						</div>

						<div class="col-md-2">
							<input type="number" step="0.01" id="price" class="form-control" placeholder="Rate/L" required>
						</div>

						<div class="col-md-2 d-grid">
							<button type="submit" class="btn btn-primary" id="saveBtn">Save</button>
						</div>
					</div>
				</form>
				<p id="msg" class="mb-0 mt-2"></p>
			</div>

			<div class="card p-3 shadow">
				<table class="table table-striped table-bordered text-center">
					<thead class="table-dark">
						<tr>
							<th>ID</th>
							<th>Name</th>
							<th>Milk</th>
							<th>Qty</th>
							<th>Rate</th>
							<th>Total</th>
							<th>Actions</th>
						</tr>
					</thead>
					<tbody id="tableBody"></tbody>
				</table>
			</div>
		</div>
	</div>
</div>

<script>
const form = document.getElementById("customerForm");
const msg = document.getElementById("msg");
let editId = null;

form.addEventListener("submit", async (e) => {
	e.preventDefault();

	const data = {
		name: document.getElementById("name").value.trim(),
		milk: document.getElementById("milk").value.trim(),
		quantity: document.getElementById("quantity").value,
		price_per_liter: document.getElementById("price").value
	};

	let res;
	if (editId) {
		res = await fetch(`/api/customers/${editId}`, {
			method: "PUT",
			headers: { "Content-Type": "application/json" },
			body: JSON.stringify(data)
		});
	} else {
		res = await fetch("/api/customers", {
			method: "POST",
			headers: { "Content-Type": "application/json" },
			body: JSON.stringify(data)
		});
	}

	const out = await res.json();
	if (!res.ok) {
		msg.className = "text-danger";
		msg.innerText = out.message || "Unable to save customer.";
		return;
	}

	msg.className = "text-success";
	msg.innerText = out.message;

	form.reset();
	editId = null;
	document.getElementById("saveBtn").innerText = "Save";
	loadCustomers();
});

async function loadCustomers() {
	const res = await fetch("/api/customers");
	if (res.status === 401) {
		window.location.href = "/login";
		return;
	}

	const rows = await res.json();
	const tableBody = document.getElementById("tableBody");
	tableBody.innerHTML = "";

	rows.forEach((row) => {
		tableBody.innerHTML += `
			<tr>
				<td>${row.id}</td>
				<td>${row.name}</td>
				<td>${row.milk}</td>
				<td>${row.quantity}</td>
				<td>${row.price_per_liter}</td>
				<td>${row.total}</td>
				<td>
					<button class="btn btn-warning btn-sm" onclick='editCustomer(${JSON.stringify(row)})'>Edit</button>
					<button class="btn btn-danger btn-sm" onclick="deleteCustomer(${row.id})">Delete</button>
					<a class="btn btn-success btn-sm" href="/invoice/${row.id}" target="_blank">Invoice</a>
				</td>
			</tr>
		`;
	});
}

function editCustomer(row) {
	document.getElementById("name").value = row.name;
	document.getElementById("milk").value = row.milk;
	document.getElementById("quantity").value = row.quantity;
	document.getElementById("price").value = row.price_per_liter;
	editId = row.id;
	document.getElementById("saveBtn").innerText = "Update";
}

async function deleteCustomer(id) {
	if (!confirm("Delete this customer?")) return;
	const res = await fetch(`/api/customers/${id}`, { method: "DELETE" });
	const out = await res.json();
	if (!res.ok) {
		msg.className = "text-danger";
		msg.innerText = out.message || "Unable to delete customer.";
		return;
	}
	msg.className = "text-success";
	msg.innerText = out.message;
	loadCustomers();
}

loadCustomers();
</script>

</body>
</html>
