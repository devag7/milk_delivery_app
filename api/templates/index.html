<!DOCTYPE html>
<html>
<head>
    <title>Dashboard | Milk Delivery</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { overflow-x: hidden; }

        .sidebar {
            height: 100vh;
            background-color: #343a40;
            color: white;
            padding-top: 20px;
        }

        .sidebar a {
            color: white;
            display: block;
            padding: 10px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background-color: #495057;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3 d-flex justify-content-between">
    <span class="navbar-brand">🥛 Milk Delivery System</span>
    <div>
        <a href="/customers" class="btn btn-outline-light btn-sm me-2">Customers</a>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-2 sidebar">
            <h5 class="text-center">Menu</h5>
            <a href="/">Dashboard</a>
            <a href="/customers">Customers</a>
            <a href="/billing">Billing</a>
            <a href="/reports">Reports</a>
        </div>

        <!-- MAIN CONTENT -->
        <div class="col-md-10 p-4">

            <h3 class="mb-4">Dashboard</h3>

            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="card shadow p-3">
                        <h6 class="text-muted mb-1">Total Customers</h6>
                        <h2 id="totalCustomers">0</h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card shadow p-3">
                        <h6 class="text-muted mb-1">Total Milk (L)</h6>
                        <h2 id="totalLiters">0</h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card shadow p-3">
                        <h6 class="text-muted mb-1">Total Revenue (₹)</h6>
                        <h2 id="totalRevenue">0</h2>
                    </div>
                </div>
            </div>

            <div class="card p-4 mt-4 shadow">
                <h5 class="text-center">📊 Revenue by Customer</h5>
                <canvas id="myChart"></canvas>
            </div>

            <div class="card p-3 shadow mt-4">
                <h5 class="mb-3">Recent Customers</h5>
                <table class="table table-striped table-bordered text-center">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Milk</th>
                            <th>Qty</th>
                            <th>Rate</th>
                            <th>Total</th>
                            <th>Invoice</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

        </div>
    </div>
</div>

<script>
async function loadCustomers() {
    const res = await fetch("/api/customers");

    if (res.status === 401) {
        window.location.href = "/login";
        return;
    }

    const data = await res.json();

    const tableBody = document.getElementById("tableBody");
    tableBody.innerHTML = "";

    const labels = [];
    const totals = [];

    data.forEach(row => {
        labels.push(row.name);
        totals.push(row.total);

        tableBody.innerHTML += `
            <tr>
                <td>${row.id}</td>
                <td>${row.name}</td>
                <td>${row.milk}</td>
                <td>${row.quantity}</td>
                <td>${row.price_per_liter}</td>
                <td>${row.total}</td>
                <td>
                    <a class="btn btn-success btn-sm"
                        href="/invoice/${row.id}" target="_blank">
                        Invoice
                    </a>
                </td>
            </tr>
        `;
    });

    drawChart(labels, totals);
}

function drawChart(labels, dataValues) {
    const ctx = document.getElementById("myChart");

    if (window.chart) {
        window.chart.destroy();
    }

    window.chart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "Revenue",
                data: dataValues
            }]
        }
    });
}

async function loadSummary() {
    const res = await fetch("/api/summary");
    if (res.status === 401) {
        window.location.href = "/login";
        return;
    }
    const data = await res.json();
    document.getElementById("totalCustomers").innerText = data.customers;
    document.getElementById("totalLiters").innerText = Number(data.liters).toFixed(2);
    document.getElementById("totalRevenue").innerText = Number(data.revenue).toFixed(2);
}

loadSummary();
loadCustomers();
</script>

</body>
</html>
