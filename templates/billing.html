<!DOCTYPE html>
<html>
<head>
    <title>Billing | Milk Delivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { overflow-x: hidden; }
        .sidebar {
            height: 100vh;
            background-color: #343a40;
            color: white;
            padding-top: 20px;
        }
        .sidebar a {
            color: white;
            display: block;
            padding: 10px;
            text-decoration: none;
        }
        .sidebar a:hover { background-color: #495057; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3 d-flex justify-content-between">
    <span class="navbar-brand">🥛 Milk Delivery System</span>
    <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
</nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar">
            <h5 class="text-center">Menu</h5>
            <a href="/">Dashboard</a>
            <a href="/customers">Customers</a>
            <a href="/billing">Billing</a>
            <a href="/reports">Reports</a>
        </div>

        <div class="col-md-10 p-4">
            <h3 class="mb-4">Billing</h3>

            <div class="card p-3 shadow">
                <table class="table table-striped table-bordered text-center mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Milk</th>
                            <th>Qty</th>
                            <th>Rate</th>
                            <th>Total</th>
                            <th>Invoice</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
async function loadCustomers() {
    const res = await fetch('/api/customers');
    if (res.status === 401) {
        window.location.href = '/login';
        return;
    }
    const rows = await res.json();
    const tableBody = document.getElementById('tableBody');
    tableBody.innerHTML = '';

    rows.forEach((row) => {
        tableBody.innerHTML += `
            <tr>
                <td>${row.id}</td>
                <td>${row.name}</td>
                <td>${row.milk}</td>
                <td>${row.quantity}</td>
                <td>${row.price_per_liter}</td>
                <td>${row.total}</td>
                <td><a class="btn btn-success btn-sm" href="/invoice/${row.id}" target="_blank">Print</a></td>
            </tr>
        `;
    });
}

loadCustomers();
</script>

</body>
</html>
