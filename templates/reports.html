<!DOCTYPE html>
<html>
<head>
    <title>Reports | Milk Delivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { overflow-x: hidden; }
        .sidebar {
            height: 100vh;
            background-color: #343a40;
            color: white;
            padding-top: 20px;
        }
        .sidebar a {
            color: white;
            display: block;
            padding: 10px;
            text-decoration: none;
        }
        .sidebar a:hover { background-color: #495057; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3 d-flex justify-content-between">
    <span class="navbar-brand">🥛 Milk Delivery System</span>
    <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
</nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar">
            <h5 class="text-center">Menu</h5>
            <a href="/">Dashboard</a>
            <a href="/customers">Customers</a>
            <a href="/billing">Billing</a>
            <a href="/reports">Reports</a>
        </div>

        <div class="col-md-10 p-4">
            <h3 class="mb-4">Reports</h3>

            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="card p-3 shadow">
                        <h6 class="text-muted">Total Customers</h6>
                        <h2 id="customers">0</h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card p-3 shadow">
                        <h6 class="text-muted">Total Milk (L)</h6>
                        <h2 id="liters">0</h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card p-3 shadow">
                        <h6 class="text-muted">Revenue (₹)</h6>
                        <h2 id="revenue">0</h2>
                    </div>
                </div>
            </div>

            <div class="card p-4 shadow">
                <h5 class="mb-3">Revenue by Customer</h5>
                <canvas id="revenueChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
async function loadSummary() {
    const res = await fetch('/api/summary');
    if (res.status === 401) {
        window.location.href = '/login';
        return;
    }
    const data = await res.json();
    document.getElementById('customers').innerText = data.customers;
    document.getElementById('liters').innerText = Number(data.liters).toFixed(2);
    document.getElementById('revenue').innerText = Number(data.revenue).toFixed(2);
}

async function loadChart() {
    const res = await fetch('/api/customers');
    if (res.status === 401) {
        window.location.href = '/login';
        return;
    }
    const rows = await res.json();
    const labels = rows.map((r) => r.name);
    const values = rows.map((r) => r.total);

    const ctx = document.getElementById('revenueChart');
    if (window.revenueChart) window.revenueChart.destroy();

    window.revenueChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels,
            datasets: [{
                label: 'Revenue',
                data: values,
                backgroundColor: 'rgba(13, 110, 253, 0.6)'
            }]
        }
    });
}

loadSummary();
loadChart();
</script>

</body>
</html>
