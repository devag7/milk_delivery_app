<!DOCTYPE html>
<html>
<head>
    <title>Sign Up | Milk Delivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width: 380px;">
        <h3 class="text-center mb-3">Create Account</h3>

        <form id="signupForm">
            <div class="mb-3">
                <input type="text" id="username" class="form-control" placeholder="Username" minlength="3" required>
            </div>

            <div class="mb-3">
                <input type="password" id="password" class="form-control" placeholder="Password (min 6 chars)" minlength="6" required>
            </div>

            <button class="btn btn-success w-100" type="submit">Sign Up</button>
        </form>

        <p id="msg" class="mt-2 text-center"></p>

        <p class="text-center mt-3 mb-0">
            Already registered?
            <a href="/login">Login</a>
        </p>
    </div>
</div>

<script>
document.getElementById("signupForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    const res = await fetch("/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();
    const msg = document.getElementById("msg");

    if (data.success) {
        msg.className = "text-success mt-2 text-center";
        msg.innerText = data.message + " Redirecting to login...";
        setTimeout(() => (window.location.href = "/login"), 1200);
    } else {
        msg.className = "text-danger mt-2 text-center";
        msg.innerText = data.message || "Unable to create account.";
    }
});
</script>

</body>
</html>
