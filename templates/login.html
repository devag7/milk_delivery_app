<!DOCTYPE html>
<html>
<head>
    <title>Login | Milk Delivery</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width: 350px;">
        
        <h3 class="text-center mb-3">🥛 Milk Delivery Login</h3>

        <form id="loginForm">
            <div class="mb-3">
                <input type="text" id="username" class="form-control" placeholder="Username" required>
            </div>

            <div class="mb-3">
                <input type="password" id="password" class="form-control" placeholder="Password" required>
            </div>

            <button class="btn btn-primary w-100" type="submit">Login</button>
        </form>

        <p id="msg" class="text-danger mt-2 text-center"></p>
        <p class="text-center mt-3 mb-0">
            New user?
            <a href="/signup">Create account</a>
        </p>

    </div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const res = await fetch("/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (data.success) {
        window.location.href = "/";
    } else {
        document.getElementById("msg").innerText = data.message || "Invalid username or password";
    }
});
</script>

</body>
</html>
